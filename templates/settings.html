<div id="extension_settings_pronouns">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b data-i18n="Pronouns">Pronouns</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container flexFlowColumn">
                <label class="checkbox_label" for="pronouns_enable_shorthands">
                    <input type="checkbox" id="pronouns_enable_shorthands" />
                    <span title="Enables English pronoun shorthand macros like &lbrace;&lbrace;she&rbrace;&rbrace;, &lbrace;&lbrace;him&rbrace;&rbrace;, &lbrace;&lbrace;their_&rbrace;&rbrace;, etc. Makes prompts easier to read and write."
                        data-i18n="Enable shorthand macros">Enable shorthand macros</span>
                </label>
                <label class="checkbox_label" for="pronouns_enable_janitor_shorthands">
                    <input type="checkbox" id="pronouns_enable_janitor_shorthands" />
                    <span title="Enables JanitorAI-compatible pronoun macros: &lbrace;&lbrace;sub&rbrace;&rbrace;, &lbrace;&lbrace;obj&rbrace;&rbrace;, &lbrace;&lbrace;pos&rbrace;&rbrace;, &lbrace;&lbrace;poss_p&rbrace;&rbrace;, &lbrace;&lbrace;ref&rbrace;&rbrace;. Enable this to use cards written for JanitorAI."
                        data-i18n="Enable JanitorAI compatibility macros">Enable JanitorAI compatibility macros</span>
                </label>
                <div class="flex-container" style="margin-top: 8px;">
                    <div id="pronouns_open_replacer" class="menu_button" data-i18n="Open pronoun replacer">Open pronoun replacer</div>
                </div>
            </div>
        </div>
    </div>
</div>
